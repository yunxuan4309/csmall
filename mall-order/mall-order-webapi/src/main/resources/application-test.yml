my:
  server:
    #localhost ,192.168.137.150
    addr: localhost
  level:
    com.cooxiao.mall: trace
spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://${my.server.addr}:3306/cs_mall_oms?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true&allowPublicKeyRetrieval=true
    username: root
    password: root
    #password: tarena2017Up;
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
    name: mall-order
  jackson:
    # 为null的属性不显示到响应结果中
    default-property-inclusion: always
  cloud:
    nacos:
      discovery:
        server-addr: ${my.server.addr}:8848
    sentinel:
      transport:
        port: 8872
        dashboard: 127.0.0.1:8090
      eager: true
  rabbitmq:
    host: ${my.server.addr}
    port: 5672
    username: guest
    password: guest
  data:
    redis:
      port: 6379
      host: ${my.server.addr}
      password:
dubbo:
  application:
    name: mall-order-dubbo
  protocol:
    port: -1
    name: dubbo
  registry:
    address: nacos://${my.server.addr}:8848
    use-as-config-center: false
    use-as-metadata-center: false
  consumer:
    check: false
    timeout: 5000
#seata服务端
seata:
  tx-service-group: csmall_group
  service:
    vgroup-mapping:
      csmall_group: default
    grouplist:
      default: ${my.server.addr}:8091
  client:
    undo:
      log-serialization: jackson

# ==================== 支付宝沙箱配置 ====================
# 使用前请先到 https://open.alipay.com → 控制台 → 研发服务 → 沙箱环境 获取参数
# 1. APP_ID：沙箱应用自动分配的 APPID
# 2. merchant-private-key：使用 openssl 生成 RSA2 密钥对的 PKCS#8 格式私钥
# 3. alipay-public-key：将公钥上传到沙箱平台后，平台生成的支付宝公钥
# 4. notify-url：支付宝异步通知地址，必须公网可访问（本地开发用 ngrok/natapp 穿透）
#    - ngrok: ngrok http 10005 → 得到 https://xxx.ngrok.io
#    - 配置为: https://xxx.ngrok.io/payment/callback/alipay/notify
alipay:
  app-id: 9021000165675647
  gateway: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  merchant-private-key-path: alipay_private_key.pem
  alipay-public-key: |
    -----BEGIN PUBLIC KEY-----
