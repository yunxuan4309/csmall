# ##################################################################### #
#                            【生产】环境配置                              #
# ##################################################################### #
#  当前文件是Profile配置，需要主配置文件中通过spring.profiles.active激活后生效   #
# ##################################################################### #

# 部署到阿里云后，将此地址替换为服务器内网IP或127.0.0.1(单机部署)
my:
  server:
    addr: ${ALIYUN_SERVER_IP:127.0.0.1}

# 优雅关闭：收到 SIGTERM 后等待在途请求处理完毕再退出（配合 systemd TimeoutStopSec=30）
server:
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: jdbc:mysql://${my.server.addr}:3306/cs_mall_oms?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
    name: mall-order
  jackson:
    default-property-inclusion: always
  cloud:
    nacos:
      discovery:
        server-addr: ${my.server.addr}:8848
  data:
    redis:
      host: ${my.server.addr}
      port: 6379
      password: ${REDIS_PASSWORD:}

dubbo:
  application:
    name: mall-order-dubbo
  protocol:
    port: -1
    name: dubbo
  registry:
    address: nacos://${my.server.addr}:8848
    use-as-config-center: false
    use-as-metadata-center: false
  consumer:
    check: false
    timeout: 5000

seata:
  tx-service-group: csmall_group
  service:
    vgroup-mapping:
      csmall_group: default
    grouplist:
      default: ${my.server.addr}:8091
  client:
    undo:
      log-serialization: jackson

knife4j:
  production: true

logging:
  level:
    com.cooxiao.mall: info

# ==================== 支付宝配置（生产环境） ====================
alipay:
  app-id: ${ALIPAY_APP_ID:}
  gateway: https://openapi.alipay.com/gateway.do
  merchant-private-key: ${ALIPAY_PRIVATE_KEY:}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY:}
  notify-url: ${ALIPAY_NOTIFY_URL:}
  return-url: ${ALIPAY_RETURN_URL:}
  sign-type: RSA2
  charset: UTF-8
  format: json
