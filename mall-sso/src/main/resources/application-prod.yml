# ##################################################################### #
#                            【生产】环境配置                              #
# ##################################################################### #
#  当前文件是Profile配置，需要主配置文件中通过spring.profiles.active激活后生效   #
# ##################################################################### #

# 部署到阿里云后，将此地址替换为服务器内网IP或127.0.0.1(单机部署)
my:
  server:
    addr: ${ALIYUN_SERVER_IP:127.0.0.1}

# 优雅关闭：收到 SIGTERM 后等待在途请求处理完毕再退出（配合 systemd TimeoutStopSec=30）
server:
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  cloud:
    nacos:
      discovery:
        server-addr: ${my.server.addr}:8848
  jackson:
    default-property-inclusion: non_null
  datasource:
    admin:
      jdbc-url: jdbc:mysql://${my.server.addr}:3306/cs_mall_ams?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD:root}
      type: com.alibaba.druid.pool.DruidDataSource
      driver-class-name: com.mysql.cj.jdbc.Driver
    user:
      jdbc-url: jdbc:mysql://${my.server.addr}:3306/cs_mall_ums?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD:root}
      type: com.alibaba.druid.pool.DruidDataSource
      driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${my.server.addr}
      port: 6379
      password: ${REDIS_PASSWORD:}

knife4j:
  production: true

logging:
  level:
    com.cooxiao.mall: info
