# ##################################################################### #
#                            【生产】环境配置                              #
# ##################################################################### #
#  当前文件是Profile配置，需要主配置文件中通过spring.profiles.active激活后生效   #
# ##################################################################### #

# 部署到阿里云后，将此地址替换为服务器内网IP或127.0.0.1(单机部署)
my:
  server:
    addr: ${ALIYUN_SERVER_IP:127.0.0.1}

spring:
  datasource:
    url: jdbc:mysql://${my.server.addr}:3306/cs_mall_ums?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
  jackson:
    default-property-inclusion: non_null
  application:
    name: mall-ums
  cloud:
    nacos:
      discovery:
        server-addr: ${my.server.addr}:8848
  redis:
    host: ${my.server.addr}
    port: 6379
    password: ${REDIS_PASSWORD:}

dubbo:
  application:
    name: mall-ums
  protocol:
    port: -1
    name: dubbo
  registry:
    address: nacos://${my.server.addr}:8848
    use-as-config-center: false
    use-as-metadata-center: false
  consumer:
    check: false
  cloud:
    subscribed-services:

knife4j:
  production: true

logging:
  level:
    com.cooxiao.mall: info
