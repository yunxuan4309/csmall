my:
  server:
    #localhost,192.168.137.150
    addr: localhost

# Seata 配置（本地开发环境）
seata:
  tx-service-group: csmall_group
  service:
    vgroup-mapping:
      csmall_group: default
    grouplist:
      default: localhost:8091

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: mall-search
  jackson:
    default-property-inclusion: always
  cloud:
    nacos:
      discovery:
        server-addr: http://${my.server.addr}:8848
  elasticsearch:
    uris: http://${my.server.addr}:9200
  data:
    redis:
      host: ${my.server.addr}
      port: 6379
      password:
      #dubbo
dubbo:
  application:
    name: mall-search
  protocol:
    port: -1
    name: dubbo
  registry:
    address: nacos://${my.server.addr}:8848
    use-as-config-center: false
    use-as-metadata-center: false
  consumer:
    check: false
logging:
  level:
    com.cooxiao.mall: trace