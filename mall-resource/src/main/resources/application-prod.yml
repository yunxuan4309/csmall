# ##################################################################### #
#                            【生产】环境配置                              #
# ##################################################################### #
#  当前文件是Profile配置，需要主配置文件中通过spring.profiles.active激活后生效   #
# ##################################################################### #

# 部署到阿里云后，将此地址替换为服务器内网IP或127.0.0.1(单机部署)
my:
  server:
    addr: ${ALIYUN_SERVER_IP:127.0.0.1}

# 服务器配置
server:
  # 端口号
  port: 9060
  # 优雅关闭：收到 SIGTERM 后等待在途请求处理完毕再退出（配合 systemd TimeoutStopSec=30）
  shutdown: graceful

# Spring相关配置
spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  # 数据源
  datasource:
    url: jdbc:mysql://${my.server.addr}:3306/cs_mall_resource?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
  # 文件上传核心配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

# 日志显示级别
logging:
  level:
    com.cooxiao.mall: info

# knife4j配置
knife4j:
  # 开启增强配置
  enable: true
  # 生产环境屏蔽，开启将禁止访问在线API文档
  production: true

# 自定义配置
custom:
  # 文件上传
  file-upload:
    # 上传到的根文件夹（Linux路径，部署前需先创建：sudo mkdir -p /data/csmall-upload）
    server-local-base-path: /data/csmall-upload
    # 上传后文件的主机名（部署后替换为你的域名或公网IP）
    resource-host: ${RESOURCE_HOST:http://127.0.0.1:${server.port}/}
    # 图片（例如商品图片）文件配置
    picture:
      # 文件夹名称
      dir-name: picuture
      # 文件大小限制，支持纯数字（以字节为单位），或以KB、MB、GB为单位（不区分大小写）
      # 注意：不得超过spring.servlet.multipart中的核心配置值
      size-limit: 10MB
      # 允许的文件类型
      content-type: image/jpeg, image/png
    # 品牌Logo配置
    brand-logo:
      # 文件夹名称
      dir-name: brand-logo
      # 文件大小限制，支持纯数字（以字节为单位），或以KB、MB、GB为单位（不区分大小写）
      # 注意：不得超过spring.servlet.multipart中的核心配置值
      size-limit: 1MB
      # 允许的文件类型
      content-type: image/png
    # 类别图标配置
    category-icon:
      # 文件夹名称
      dir-name: category-icon
      # 文件大小限制，支持纯数字（以字节为单位），或以KB、MB、GB为单位（不区分大小写）
      # 注意：不得超过spring.servlet.multipart中的核心配置值
      size-limit: 1MB
      # 允许的文件类型
      content-type: image/png