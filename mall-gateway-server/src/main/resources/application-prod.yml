# ##################################################################### #
#                            【生产】环境配置                              #
# ##################################################################### #
#  当前文件是Profile配置，需要主配置文件中通过spring.profiles.active激活后生效   #
# ##################################################################### #

# 部署到阿里云后，将此地址替换为服务器内网IP或127.0.0.1(单机部署)
my:
  server:
    addr: ${ALIYUN_SERVER_IP:127.0.0.1}

# 优雅关闭：收到 SIGTERM 后等待在途请求处理完毕再退出（配合 systemd TimeoutStopSec=30）
server:
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: gateway-server
  cloud:
    nacos:
      config:
        server-addr: ${my.server.addr}:8848
        group: DEFAULT_GROUP
        file-extension: yml
      discovery:
        server-addr: ${my.server.addr}:8848
    gateway:
      discovery:
        # 生产环境关闭动态路由，防止内部服务暴露
        locator:
          enabled: false
      # 手动定义只对外暴露的路由
      routes:
        # 前台商品展示
        - id: mall-front
          uri: lb://mall-front
          predicates:
            - Path=/front/**
        # 订单服务
        - id: mall-order
          uri: lb://mall-order
          predicates:
            - Path=/oms/**
        # 搜索服务
        - id: mall-search
          uri: lb://mall-search
          predicates:
            - Path=/search/**
        # SSO 登录认证
        - id: mall-sso
          uri: lb://mall-sso
          predicates:
            - Path=/sso/**,/admin/sso/**,/user/sso/**,/user/info/**
        # 文件资源
        - id: mall-resource
          uri: lb://mall-resource
          predicates:
            - Path=/resource/**,/upload/**
        # 秒杀服务
        - id: mall-seckill
          uri: lb://mall-seckill
          predicates:
            - Path=/seckill/**
        # 以下服务不对外暴露，仅通过Dubbo RPC内部调用：
        # mall-ams（后台管理）、mall-ums（用户管理）、mall-product（商品管理）

knife4j:
  production: true

logging:
  level:
    com.cooxiao.mall: info
