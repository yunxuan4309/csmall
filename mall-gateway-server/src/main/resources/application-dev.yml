my:
  server:
    #本地虚拟机
    #addr: 192.168.137.150
    #ucloud 云
    addr: 106.75.107.221
    #华为云
    #addr: 114.116.199.250

# 日志显示级别
logging:
  level:
    com.cooxiao.mall: trace

spring:
  application:
    name: gateway-server
  cloud:
    nacos:
      config:
        # 开发环境使用本地配置，禁用远程 Nacos
        enabled: false
      discovery:
        # 开发环境禁用服务发现（使用静态路由直连本地服务）
        enabled: false
    gateway:
      discovery:
        # 开发环境关闭动态路由，使用手动路由直连本地服务
        locator:
          enabled: false
      # 手动路由配置（开发环境直连本地服务）
      routes:
        # 前台商品展示
        - id: mall-front
          uri: http://localhost:10004
          predicates:
            - Path=/front/**
        # 订单服务
        - id: mall-order
          uri: http://localhost:10005
          predicates:
            - Path=/oms/**
        # 搜索服务
        - id: mall-search
          uri: http://localhost:10008
          predicates:
            - Path=/search/**
        # SSO 登录认证
        - id: mall-sso
          uri: http://localhost:10009
          predicates:
            - Path=/sso/**,/admin/sso/**,/user/sso/**,/user/info/**
        # 文件资源
        - id: mall-resource
          uri: http://localhost:9060
          predicates:
            - Path=/resource/**,/upload/**
        # 秒杀服务
        - id: mall-seckill
          uri: http://localhost:10007
          predicates:
            - Path=/seckill/**
        # AI 智能导购
        - id: mall-ai
          uri: http://localhost:10010
          predicates:
            - Path=/ai/**
        # 用户注册（仅开放注册和校验接口，其他 UMS 管理接口不对外暴露）
        - id: mall-ums-register
          uri: http://localhost:10006
          predicates:
            - Path=/ums/user/register,/ums/user/checkValue
        # 以下服务不对外暴露，仅通过 Dubbo RPC 内部调用：
        # mall-ams（后台管理）、mall-product（商品管理）