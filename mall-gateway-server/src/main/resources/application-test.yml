my:
  server:
    addr: localhost

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: gateway-server
  cloud:
    nacos:
      config:
        server-addr: ${my.server.addr}:8848
        group: DEFAULT_GROUP
        file-extension: yml
      discovery:
        server-addr: ${my.server.addr}:8848
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        # 前台商品展示
        - id: mall-front
          uri: lb://mall-front
          predicates:
            - Path=/front/**
        # 订单服务
        - id: mall-order
          uri: lb://mall-order
          predicates:
            - Path=/oms/**
        # 搜索服务
        - id: mall-search
          uri: lb://mall-search
          predicates:
            - Path=/search/**
        # SSO 登录认证
        - id: mall-sso
          uri: lb://mall-sso
          predicates:
            - Path=/sso/**,/admin/sso/**,/user/sso/**,/user/info/**
        # 文件资源
        - id: mall-resource
          uri: http://127.0.0.1:9060
          predicates:
            - Path=/resource/**,/upload/**
        # 秒杀服务
        - id: mall-seckill
          uri: lb://mall-seckill
          predicates:
            - Path=/seckill/**
        # AI 智能导购
        - id: mall-ai
          uri: lb://mall-ai
          predicates:
            - Path=/ai/**
        # 用户注册（仅开放注册和校验接口）
        - id: mall-ums-register
          uri: lb://mall-ums
          predicates:
            - Path=/ums/user/register,/ums/user/checkValue
        # 后台管理
        - id: mall-ams
          uri: lb://mall-ams
          predicates:
            - Path=/admin/**
