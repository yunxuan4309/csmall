my:
  server:
    addr: localhost

spring:
  cloud:
    nacos:
      discovery:
        server-addr: http://${my.server.addr}:8848
  elasticsearch:
    uris: http://${my.server.addr}:9200
  data:
    redis:
      host: ${my.server.addr}
      port: 6379
      password:

dubbo:
  application:
    name: mall-ai
  protocol:
    port: -1
    name: dubbo
  registry:
    address: nacos://${my.server.addr}:8848
    use-as-config-center: false
    use-as-metadata-center: false
  consumer:
    check: false

custom:
  file-upload:
    resource-host: http://localhost:9060/

cooxiao:
  ai:
    # 开发阶段放行 sync 接口（Swagger 可直调）
    sync-whitelisted: true

logging:
  level:
    com.cooxiao.mall: trace
