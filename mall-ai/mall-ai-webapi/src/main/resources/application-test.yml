    nacos:
      discovery:
        server-addr: http://${my.server.addr}:8848
  elasticsearch:
    uris: http://${my.server.addr}:9200
  data:
    redis:
      host: ${my.server.addr}
      port: 6379
      password:

dubbo:
  application:
    name: mall-ai
  protocol:
    port: -1
    name: dubbo
