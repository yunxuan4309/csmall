my:
  server:
    addr: ${ALIYUN_SERVER_IP:127.0.0.1}

server:
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  cloud:
    nacos:
      discovery:
        server-addr: http://${my.server.addr}:8848
  elasticsearch:
    uris: http://${my.server.addr}:9200
  data:
    redis:
      host: ${my.server.addr}
      port: 6379
      password: ${REDIS_PASSWORD:}

dubbo:
  application:
    name: mall-ai
  protocol:
    port: -1
    name: dubbo
  registry:
    address: nacos://${my.server.addr}:8848
    use-as-config-center: false
    use-as-metadata-center: false
  consumer:
    check: false

custom:
  file-upload:
    resource-host: ${RESOURCE_HOST:http://8.156.85.160/}

cooxiao:
  ai:
    # 生产环境：启动时自动同步数据到 ES
    sync-auto-on-startup: true
    # 生产环境：sync 接口不加入白名单，需要鉴权
    sync-whitelisted: false
    # 向量检索（硅基流动 BGE-M3，生产默认关闭，按需开启）
    embedding-enabled: false
    embedding-api-key: ${EMBEDDING_API_KEY:sk-placeholder}

knife4j:
  production: true

logging:
  level:
    com.cooxiao.mall: info
