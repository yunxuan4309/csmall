server:
  port: 10010
spring:
  profiles:
    active: test
  application:
    name: mall-ai

seata:
  enabled: false

cooxiao:
  ai:
    api-key: ${AI_API_KEY:sk-placeholder}
    base-url: ${AI_API_BASE_URL:https://api.deepseek.com}
    chat-model: deepseek-v4-flash
    compare-model: deepseek-v4-flash
    temperature: 0.7
    max-tokens: 2000
    timeout: 15000
    # Embedding 向量检索（硅基流动 BGE-M3，免费）
    embedding-enabled: false
    embedding-api-key: ${EMBEDDING_API_KEY:sk-placeholder}
    embedding-base-url: https://api.siliconflow.cn
    embedding-model: BAAI/bge-m3
    embedding-dimensions: 1024
    embedding-price-per-million: 0.0
    # 每日预算 2 元
    daily-budget: 2.0
    chat-input-price-per-million: 1.0
    chat-output-price-per-million: 2.0

knife4j:
  enable: true
  production: false
  basic:
    enable: false
    username: root
    password: root

jwt:
  # JWT存储的请求头
  tokenHeader: Authorization
  # JWT加解密使用的密钥(HS512要求>=64字节)
  secret: CooxiaoMall2026JwtSecretKeyForHs512AlgorithmMustBeAtLeast64BytesLong
  # JWT的超期限时间(60*60*24)
  expiration: 604800
  tokenHead: Bearer


logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
