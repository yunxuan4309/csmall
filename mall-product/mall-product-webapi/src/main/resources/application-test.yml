# ##################################################################### #
#                            【开发】环境配置                             #
# ##################################################################### #
# 当前文件是Profile配置，需要主配置文件中通过spring.profiles.active激活后生效 #
# ##################################################################### #

#定义云服务器或者本地ip
my:
  server:
    #addr: localhost,106.175.107.221
    addr: localhost
# 日志显示级别
logging:
  level:
    com.cooxiao.mall: trace
# Spring相关配置
spring:
  threads:
    virtual:
      enabled: true
  # 数据源配置
  datasource:
    url: jdbc:mysql://${my.server.addr}:3306/cs_mall_pms?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true&allowPublicKeyRetrieval=true
    username: root
    #JIAOXUE:password: root,deploy: password: tarena2017Up;
    password: root
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
  # jackson配置
  jackson:
    # 为null的属性不显示到响应结果中
    default-property-inclusion: always
  data:
    redis:
      host: ${my.server.addr}
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: ${my.server.addr}:8848
    sentinel:
      transport:
        port: 8873
        dashboard: 127.0.0.1:8090
      eager: true
  application:
    name: mall-product
dubbo:
  application:
    name: mall-product
  protocol:
    port: -1
    name: dubbo
  registry:
    address: nacos://${my.server.addr}:8848
    use-as-config-center: false
    use-as-metadata-center: false
  consumer:
    check: false

seata:
  tx-service-group: csmall_group
  service:
    vgroup-mapping:
      csmall_group: default
    grouplist:
      default: ${my.server.addr}:8091
  client:
    undo:
      log-serialization: jackson
custom:
  file-upload:
    server-local-path: 1
    # 测试环境：静态资源由 mall-resource (9060) 提供
    resource-host: http://localhost:9060/