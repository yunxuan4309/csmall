my:
  server:
    #localhost,192.168.137.150
    addr: localhost

# Seata 配置（本地开发环境）
seata:
  tx-service-group: csmall_group
  service:
    vgroup-mapping:
      csmall_group: default
    grouplist:
      default: localhost:8091

# 日志显示级别
logging:
  level:
    com.cooxiao.mall: trace
spring:
  threads:
    virtual:
      enabled: true
  application:
    name: mall-front
  jackson:
    default-property-inclusion: always
  cloud:
    nacos:
      discovery:
        server-addr: ${my.server.addr}:8848
    sentinel:
      transport:
        port: 8874
        dashboard: 127.0.0.1:8090
      eager: true
  data:
    redis:
      host: ${my.server.addr}
      port: 6379

dubbo:
  application:
    name: mall-front
  protocol:
    port: -1
    name: dubbo
  registry:
    address: nacos://${my.server.addr}:8848
    use-as-config-center: false
    use-as-metadata-center: false
  consumer:
    check: false
  cloud:
    subscribed-services: mall-product