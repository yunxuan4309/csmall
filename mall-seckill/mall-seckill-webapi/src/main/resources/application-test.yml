my:
  server:
    #localhost,192.168.137.150
    addr: localhost
spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://${my.server.addr}:3306/cs_mall_seckill?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: root
    #password: tarena2017Up;
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    default-property-inclusion: always
  application:
    name: mall-seckill
  cloud:
    nacos:
      discovery:
        server-addr: ${my.server.addr}:8848
    sentinel:
      transport:
        port: 8870
        dashboard: 127.0.0.1:8080
  redis:
    # ${my.server.addr}；192.168.137.150
    host: ${my.server.addr}
    port: 6379
    password:
  rabbitmq:
    host: ${my.server.addr}
    port: 5672
    # deploy：username/password: user/123456；jiaoxue：    username: guest,password: guest
    username: guest
    password: guest
    #username: user
    #password: 123456
    virtual-host: /
    # 开启手动确认模式，防止消息处理异常时丢失
    listener:
      simple:
        acknowledge-mode: manual
        # 消费端重试: 最大重试3次,间隔1秒
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000

dubbo:
  application:
    name: mall-seckill
  protocol:
    port: -1
    name: dubbo
  registry:
    address: nacos://${my.server.addr}:8848
    use-as-metadata-center: false
    use-as-config-center: false
  consumer:
    check: false
    timeout: 5000
#seata分布式事务
seata:
  tx-service-group: csmall_group
  service:
    vgroup-mapping:
      csmall_group: default
    grouplist:
      default: ${my.server.addr}:8091
  client:
    undo:
      log-serialization: jackson
logging:
  level:
    com.cooxiao.mall: info
    # 需要调试时可将具体包改为debug,如:
    # com.cooxiao.mall.seckill.service: debug